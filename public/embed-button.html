<!--
  UpliftEdu Courses - Embeddable Button

  Copy the code below and paste it anywhere in your upliftedu.in website.
  Update the href URL after deploying to Vercel.
-->

<!-- OPTION 1: Simple Button -->
<a href="https://your-vercel-url.vercel.app" target="_blank" rel="noopener"
   style="display:inline-block;background:#ef5179;color:#fff;padding:14px 32px;border-radius:8px;font-family:'Inter',sans-serif;font-size:16px;font-weight:600;text-decoration:none;transition:background 0.2s,transform 0.2s;cursor:pointer;"
   onmouseover="this.style.background='#db3760';this.style.transform='translateY(-1px)'"
   onmouseout="this.style.background='#ef5179';this.style.transform='translateY(0)'">
   Explore All Courses
</a>

<!-- OPTION 2: Button with arrow icon -->
<a href="https://your-vercel-url.vercel.app" target="_blank" rel="noopener"
   style="display:inline-flex;align-items:center;gap:8px;background:#ef5179;color:#fff;padding:14px 32px;border-radius:8px;font-family:'Inter',sans-serif;font-size:16px;font-weight:600;text-decoration:none;transition:background 0.2s,transform 0.2s;cursor:pointer;box-shadow:0 4px 14px rgba(239,81,121,0.3);"
   onmouseover="this.style.background='#db3760';this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(239,81,121,0.4)'"
   onmouseout="this.style.background='#ef5179';this.style.transform='translateY(0)';this.style.boxShadow='0 4px 14px rgba(239,81,121,0.3)'">
   Explore All Courses <span style="font-size:18px;">&rarr;</span>
</a>

<!-- OPTION 3: Outline/Ghost Button -->
<a href="https://your-vercel-url.vercel.app" target="_blank" rel="noopener"
   style="display:inline-block;background:transparent;color:#ef5179;padding:12px 28px;border:2px solid #ef5179;border-radius:8px;font-family:'Inter',sans-serif;font-size:16px;font-weight:600;text-decoration:none;transition:all 0.2s;cursor:pointer;"
   onmouseover="this.style.background='#ef5179';this.style.color='#fff';this.style.transform='translateY(-1px)'"
   onmouseout="this.style.background='transparent';this.style.color='#ef5179';this.style.transform='translateY(0)'">
   Explore All Courses
</a>
